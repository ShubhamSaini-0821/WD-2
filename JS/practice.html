        let stdata={

            console.log(a);

           }

             console.log("updated way " + edu);
           }
           //for loop-it iterates over the index of an array
           for(let i in stdata){
             console.log("updated " + stdata[i]);
           }
           //for in loop-it iterates over the properties of 
          // an object and returns the index of the array
          for(let x in stdata){
            console.log("  " + stdata[x]);
          }
