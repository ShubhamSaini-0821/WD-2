<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //conditional statements in JS
        //if statement
        //age validation for voting
        let age=18;
        if(age>=18){
            console.log(age + " is you are eligible to vote"); 
        }
        //if else statement
        let myAge=17;
        if(myAge>=18){
            console.log(myAge + " is you are eligible to vote");
        } else {
            console.log(myAge + " is you are not eligible to vote");
        } 
        //switch statement
        let day=3;
        switch(day){
            case 1:
                console.log("Monday");
                break;
            case 2:
                console.log("Tuesday");
                break;
            case 3:
                console.log("Wednesday");
                break;
            case 4:
                console.log("Thursday");
                break;
            case 5:
                console.log("Friday");
                break;
            case 6:
                console.log("Saturday");
                break;
            case 7:
                console.log("Sunday");
                break;
            default:
                console.log("Invalid day");
        }
        //if else if statement
        let marks=85;
        if(marks>=90){
            console.log("Grade A");
        } else if(marks>=80 && marks<90){
            console.log("Grade B");
        } else if(marks>=70 && marks<80){
            console.log("Grade C");
        } else if(marks>=60 && marks<70){
            console.log("Grade D");
        } else {
            console.log("Grade F");
        }
        //
    </script>
</body>
</html>
