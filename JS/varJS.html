    <script>
  // JS Variables... contains either value or not...
  var var_name="Shubham"; //Global variable
    document.write(var_name);
    console.log(var_name);

    var var_name="Saini"; //Reassigning the value of variable
     console.log(var_name);
    function demo(){
        var msg="Welcome to JS";
        console.log(msg);
    }
    demo();
    //Variable declaration using let and const
    let myNumber=123456789;
    console.log(myNumber);
    myNumber=987654321; //no declare but reassign
    console.log(myNumber);
    const myEmail="sainisbm888";
    console.log(myEmail);
   //myEmail="sainisbm999"  //no declare and no reassign
   console.log(myEmail);
   
     </script>
