<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout-2</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container m-5 p-5 " >
        <!-- Header -->
        <div class="row box">
            <div class="col-lg-6" style="background-color: #9acbfc; padding: 20px;">
                <h2>Login</h2>
            </div>
            <div class="col-lg-6" style="background-color: #86b9ec; padding: 20px;">
                <h2>Navigation</h2>
            </div>
            <!-- main content -->
        </div>
        <div class="row">
            <div class="col-lg-12" style="background-color: #d8f886; padding: 20px;">
                <h2>Main Content</h2>
            </div>
        </div>
        <!-- second content -->
        <div class="row">
            <div class="col-lg-12" style="background-color: #f8d7da; padding: 20px;">
                <h2>Second Content</h2>
            </div>
        </div>
        <!-- box -->
        <div class="row d-flex bg-info gy-2" style="height:150px">
            <div class="col-lg-4" style="background-color: #e2e3e5; padding: 20px;">
                <h2>Box1</h2>
            </div>
              <div class="col-lg-4" style="background-color: #e2e3e5; padding: 20px;">
                <h2>Box2</h2>
            </div>
              <div class="col-lg-4" style="background-color: #e2e3e5; padding: 20px;">
                <h2>Box3</h2>
            </div>
        </div>
        <!-- footer -->
        <div class="row">
            <div class="col-lg-12" style="background-color: #f8f9fa; padding: 20px; text-align: center;">
                <p>&copy; 2023 My Website. All rights reserved.</p>
            </div>
        </div>
    </div>
</body>
</html>
