<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout 1 </title>
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <!-- header start -->
        <div class="row" style="background-color: #9acbfc; padding: 20px;">
            <div class="col-12">
                <h2>Heading</h2>
            </div>
        </div>
        <!-- header end -->
         <!-- Navigation start -->
          <div class="row" style="background-color: #86b9ec; padding: 20px;">
            <div class="col-lg-12">
                <h2>Navigation</h2>
            </div>
          </div>
         <!-- Navigation end -->
            <!-- Main content start -->
            <div class="row">
                <div class="col-lg-8" style="background-color: #d8f886; padding: 20px;">
                    <h2>Main Content</h2>
                    </div>
                <div class="col-lg-4" style="background-color: #e9ecef; padding: 20px;">
                    <h2>Sidebar</h2>
                    </div>
                    </div> 
            <!-- Main content end -->
                   <!-- main content 2 start -->
              <div class="row box gy-2" >
                <!-- left start -->
                <div class="col-lg-6 bg-info d-flex">
                    <!-- left1 start -->
                   <div class="col-lg-6 w=50 bg-success text-white">
                    <h2>Left1</h2>
                   </div>
                   <!-- left1 end -->
                    <!-- left2 start -->
                   <div class="col-lg-6 w=50 bg-light">
                    <h2>Left2</h2>
                   </div>
                   <!-- left2 end -->
                </div>
                <!-- left end -->
                 <!-- right start -->
                <div class="col-lg-6 bg-dark text-white">
                   <!-- right top start -->
                    <div class="col-lg-12 h=50 bg-success">
                        <h2>Right Top</h2>
                    </div>
                    <!-- right top end -->
                     <!-- right bottom start -->
                     <div class="col-lg-12 h=50 bg-warning">
                        <h2>Right Bottom</h2>
                     </div>
                     <!-- right bottom end -->
                    </div>
                    <!-- right end -->
                </div>
                <!-- main content 2 end -->
            <!-- Footer start -->
            <div class="row" style="background-color: #6c757d; color: white; padding: 20px;">
                <div class="col-12">
                    <h2>Footer</h2>
                    </div>
            </div>
            <!-- Footer end -->
            
    </div>
</body>
</html>
